name: vigil
description: Real-time crisis command and coordination platform for hotels.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_database: ^11.1.4
  firebase_messaging: ^15.1.3
  firebase_storage: ^12.3.2

  # AI
  google_generative_ai: ^0.4.6

  # UI & Animations
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.2.0+3
  animations: ^2.0.11

  # Charts
  fl_chart: ^0.69.0

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # Storage & Utils
  shared_preferences: ^2.3.2
  intl: ^0.20.1
  uuid: ^4.5.1

  # HTTP / External APIs
  http: ^1.2.2

  # Maps
  google_maps_flutter: ^2.9.0

  # Local notifications
  flutter_local_notifications: ^17.2.3

  # PDF export
  pdf: ^3.11.1
  printing: ^5.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

# Flutter 3.x version overrides
dependency_overrides:
  meta: ^1.16.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/svg/
