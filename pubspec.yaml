name: vigil
description: Real-time crisis command and coordination platform for hotels.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # UI
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.2.0

  # Utilities
  intl: ^0.20.1
  uuid: ^4.5.1

# Flutter 3.41.7 pins several packages to versions not yet on pub.dev.
# These overrides force the latest *published* version of each.
dependency_overrides:
  meta: ^1.16.0
  test_api: ^0.7.0
  material_color_utilities: ^0.12.0

flutter:
  uses-material-design: true
